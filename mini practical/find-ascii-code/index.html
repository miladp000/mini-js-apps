<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEY CODE</title>
    <style>
        body{
            display: flex;
            align-items: center;
            flex-direction: column;
            background-color: #324c61;
            color: #fff;
        }
        h4{
            text-align: center;
        }
        button{
            display: block;
            margin: auto;
            padding: 10px;
            background-color: tomato;
            color: #fff;
            font-weight: 600;
            border: 0;
            border-radius: 4px;
        }
        h1{
            text-align: center;
            margin-top: 100px;
            font-size: 5em;
        }
    </style>
</head>
<body>
    <h4>Press Eny Key on your keaboard and then it's KEY CODE will be shown to you </h4>
    <button>Press Any Key</button>
    <h1></h1>

    <script>
        window.addEventListener("keydown",  (e) => {
            let resul = document.querySelector("h1");
            resul.innerHTML = e.keyCode;
        })
    </script>
</body>
</html>
