<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pop-UP</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="gallery-wrap">
      <img class="back-btn" src="images/back.png" />
      <div class="gallery">
        <div class="box">
          <div class="image-wrap"><img src="images/bg (1).jpg" /></div>
          <div class="image-wrap"><img src="images/bg (1).png" /></div>
          <div class="image-wrap"><img src="images/bg (2).jpg" /></div>
        </div>
        <div class="box">
          <div class="image-wrap"><img src="images/image-1.png" /></div>
          <div class="image-wrap"><img src="images/image-2.png" /></div>
          <div class="image-wrap"><img src="images/image-3.png" /></div>
        </div>
        <div class="box">
            <div class="image-wrap"><img src="images/image-4.png" /></div>
          <div class="image-wrap"><img src="images/image-5.png" /></div>
          <div class="image-wrap"><img src="images/image-6.png" /></div>
        </div>
      </div>
      <img class="next-btn" src="images/next.png" />
    </div>

    <script src="script.js"></script>
  </body>
</html>
