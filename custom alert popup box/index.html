<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=error"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <button class="clickBtn">Click</button>
      <div class="box">
        <div class="icon"><span class="material-symbols-outlined">error</span></i></div>
        <h1 class="h1-text">Your account will be deleted permanently!</h1>
        <p class="p-text">Are you sure to proceed?</p>
        <div class="box-btn">
          <button class="delBtn">Delete Account</button>
          <button class="cancelBtn">Cancel Process</button>
        </div>
      </div>
      <div class="message"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
