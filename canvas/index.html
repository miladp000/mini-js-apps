<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Simple Colorful Line Draw</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container{
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: hsla(229, 85%, 23%, 0.493);
      }
      canvas {
        border: 2px solid;
        width: 90%;
        height: 90%;
        display: block;
        margin: 10px auto;
        background-color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="container"><canvas></canvas></div>
    
    <script>
      const canvas = document.querySelector("canvas");
      let ctx = canvas.getContext("2d");
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
      let lastX = 0;
      let lastY = 0;
      let lineWidth = 2;
      let hue = 0;

      let isDrawing = false;
      let lineWidthFlag = true;

      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      canvas.addEventListener("mousedown", (e) => {
        isDrawing = true;
        [lastX, lastY] = [e.offsetX, e.offsetY];
      });
      canvas.addEventListener("mousemove", draw);
      canvas.addEventListener("mouseup", () => (isDrawing = false));
      canvas.addEventListener("mouseout", () => (isDrawing = false));

      function draw(e) {
        if (!isDrawing) return;
        console.log(e);
        console.log(lastY);
        console.log(lastX);

        ctx.beginPath();
        ctx.lineWidth = lineWidth;
        ctx.strokeStyle = `hsl(${hue} , 100% , 50%)`;
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
        [lastX, lastY] = [e.offsetX, e.offsetY];

        // line with
        if (lineWidth > 30 || lineWidth < 2) {
          lineWidthFlag = !lineWidthFlag;
        }
        if (lineWidthFlag) {
          lineWidth += 0.5;
        } else {
            lineWidth -= 0.5;
        }
        // line color change
        hue++;
        if(hue > 360){
            hue = 0;
        }

      }
    </script>
  </body>
</html>
