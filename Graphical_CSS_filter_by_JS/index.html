<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graphical CSS Filter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="image-container">
        <img src="fruit.jpg" />
        <button id="reset-btn">Reset</button>
      </div>
      <div class="options">
        <div class="blur-container">
          <label for="blur">Blur</label>
          <input type="range" name="blur" value="0" data-value="0" min="0" max="10" step="1" data-size="px"  />
        </div>
        <div class="brightness-container">
          <label for="brightness">Brightness</label>
          <input type="range" name="brightness" value="100" data-value="100" min="0" max="1000" step="10" data-size="%" />
        </div>
        <div class="contrast-container">
          <label for="contrast">Contrast</label>
          <input type="range" name="contrast" value="100" data-value="100" min="0" max="1000" step="10" data-size="%" />
        </div>
        <div class="grayScale-container">
          <label for="grayScale">Gray-Scale</label>
          <input type="range" name="grayscale" value="0" data-value="0" min="0" max="100" step="2" data-size="%" />
        </div>
        <div class="hue-rotate-container">
          <label for="hue-rotate">Hue-Rotate</label>
          <input type="range" name="hue-rotate" value="0" data-value="0" min="0" max="360" step="6" data-size="deg" />
        </div>
        <div class="invert-container">
          <label for="invert">Invert</label>
          <input type="range" name="invert" value="0" data-value="0" min="0" max="100" step="2" data-size="%" />
        </div>
        <div class="opacity-container">
          <label for="opacity">Opacity</label>
          <input type="range" name="opacity" value="100" data-value="100" min="0" max="100" step="2" data-size="%" />
        </div>
        <div class="saturate-container">
          <label for="saturate">Saturate</label>
          <input type="range" name="saturate" value="100" data-value="100" min="0" max="500" step="10" data-size="%" />
        </div>
        <div class="sepia-container">
          <label for="sepia">Sepia</label>
          <input type="range" name="sepia" value="0" data-value="0" min="0" max="100" step="2" data-size="%" />
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
